[pytest]
# Marcadores que ya tenías
markers =
    smoke: pruebas rápidas y críticas
    exception: pruebas de manejo de excepciones

# Configuración para ver logs en CONSOLA
log_cli = true
log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)s] %(message)s

# Configuración para guardar logs en ARCHIVO
log_file = tests.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
